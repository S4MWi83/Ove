    <style>
        :root { --deep:#060f1e; --blue:#3b82f6; --blue-dim:rgba(59,130,246,0.15); --blue-glow:rgba(59,130,246,0.35); --cream:#f0ece4; --muted:#9db5cc; --border:rgba(255,255,255,0.07); }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body { font-family:'DM Sans',sans-serif; background:var(--deep); color:var(--cream); min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased; }
        body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; opacity:0.4; }
        .orb { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0; width:60vw; height:60vw; top:-20vw; left:50%; transform:translateX(-50%); background:radial-gradient(circle,rgba(59,130,246,0.13),transparent 70%); }
        nav { display:flex; align-items:center; justify-content:space-between; padding:1.25rem 2rem; position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(6,15,30,0.6); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-bottom:1px solid var(--border); box-shadow:0 1px 20px rgba(59,130,246,0.08); }
        .nav-logo { font-family:'Instrument Serif',serif; font-size:1.8rem; color:var(--cream); text-decoration:none; position:relative; }
        .nav-logo span { display:inline-block; width:6px; height:6px; background:var(--blue); border-radius:50%; position:absolute; top:6px; right:-9px; box-shadow:0 0 8px var(--blue-glow); }
        .nav-links { display:flex; align-items:center; gap:1.5rem; }
        .nav-link { font-size:0.85rem; font-weight:400; color:var(--muted); text-decoration:none; transition:color 0.2s; }
        .nav-link:hover { color:var(--cream); }
        .lang-switcher { position:relative; }
        .lang-btn { background:none; border:1px solid var(--border); border-radius:8px; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.8rem; padding:0.3rem 0.6rem; cursor:pointer; display:flex; align-items:center; gap:0.3rem; transition:all 0.2s; white-space:nowrap; }
        .lang-btn:hover { color:var(--cream); border-color:rgba(255,255,255,0.15); }
        .lang-dropdown { display:none; position:absolute; top:calc(100% + 8px); right:0; background:#0d1f38; border:1px solid var(--border); border-radius:12px; overflow:hidden; min-width:130px; box-shadow:0 8px 32px rgba(0,0,0,0.4); z-index:999; }
        .lang-switcher.open .lang-dropdown { display:block; }
        .lang-option { display:flex; align-items:center; gap:0.6rem; padding:0.65rem 1rem; font-size:0.82rem; color:var(--muted); cursor:pointer; transition:all 0.15s; border:none; background:none; width:100%; font-family:'DM Sans',sans-serif; text-align:left; }
        .lang-option:hover { background:rgba(255,255,255,0.05); color:var(--cream); }
        .lang-option.active { color:var(--cream); background:rgba(59,130,246,0.1); }
        .wrap { max-width:1080px; margin:0 auto; padding:0 2rem; position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; }
        .holding { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:8rem 2rem 6rem; opacity:0; animation:fadeUp 0.8s ease forwards 0.3s; }
        .holding-label { font-size:0.72rem; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--blue); opacity:0.85; margin-bottom:1.25rem; }
        .holding-title { font-family:'Instrument Serif',serif; font-size:clamp(2.8rem,6vw,5rem); line-height:1.06; letter-spacing:-0.02em; margin-bottom:1.25rem; }
        .holding-title em { font-style:italic; color:#93c5fd; }
        .holding-sub { font-size:1rem; color:var(--muted); font-weight:300; max-width:440px; line-height:1.8; margin-bottom:3rem; }
        .holding-btn { position:relative; display:inline-flex; align-items:center; gap:0.6rem; background:transparent; color:var(--cream); font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:500; padding:0.9rem 2rem; border-radius:999px; border:none; cursor:pointer; transition:all 0.4s ease; letter-spacing:0.1em; text-transform:uppercase; outline:none; text-decoration:none; }
        .holding-btn::before { content:''; position:absolute; inset:0; border-radius:999px; border:1px solid rgba(59,130,246,0.35); transition:all 0.4s ease; pointer-events:none; }
        .holding-btn::after { content:''; position:absolute; inset:3px; border-radius:999px; border:1px solid rgba(59,130,246,0.15); transition:all 0.4s ease; pointer-events:none; }
        .holding-btn:hover::before { border-color:rgba(59,130,246,0.7); box-shadow:0 0 20px rgba(59,130,246,0.2),inset 0 0 20px rgba(59,130,246,0.05); }
        .holding-btn:hover { color:white; }

</script>
