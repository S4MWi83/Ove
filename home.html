    <style>

        nav { display:flex; align-items:center; justify-content:space-between; padding:1.25rem 2rem; position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(6,15,30,0.6); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-bottom:1px solid var(--border); box-shadow:0 1px 20px rgba(59,130,246,0.08); }

        .nav-logo span { display:inline-block; width:6px; height:6px; background:var(--blue); border-radius:50%; position:absolute; top:6px; right:-9px; box-shadow:0 0 8px var(--blue-glow); }
        .nav-links { display:flex; align-items:center; gap:1.5rem; }
        .nav-link { font-size:0.85rem; font-weight:400; color:var(--muted); text-decoration:none; transition:color 0.2s; }
        .nav-link:hover { color:var(--cream); }
        .lang-switcher { position:relative; }
        .lang-btn { background:none; border:1px solid var(--border); border-radius:8px; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.8rem; padding:0.3rem 0.6rem; cursor:pointer; display:flex; align-items:center; gap:0.3rem; transition:all 0.2s; white-space:nowrap; }
        .lang-btn:hover { color:var(--cream); border-color:rgba(255,255,255,0.15); }
        .lang-dropdown { display:none; position:absolute; top:calc(100% + 8px); right:0; background:#0d1f38; border:1px solid var(--border); border-radius:12px; overflow:hidden; min-width:130px; box-shadow:0 8px 32px rgba(0,0,0,0.4); z-index:999; }
        .lang-switcher.open .lang-dropdown { display:block; }
        .lang-option { display:flex; align-items:center; gap:0.6rem; padding:0.65rem 1rem; font-size:0.82rem; color:var(--muted); cursor:pointer; transition:all 0.15s; border:none; background:none; width:100%; font-family:'DM Sans',sans-serif; text-align:left; }
        .lang-option:hover { background:rgba(255,255,255,0.05); color:var(--cream); }
        .lang-option.active { color:var(--cream); background:rgba(59,130,246,0.1); }

        .demo-section { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:8rem 2rem 6rem; opacity:0; animation:fadeUp 0.8s ease forwards 0.3s; }

        .demo-section-title { font-family:'Instrument Serif',serif; font-size:clamp(1.8rem,3.5vw,2.4rem); line-height:1.12; letter-spacing:-0.01em; margin-bottom:0.85rem; }
        .demo-section-sub { font-size:0.95rem; color:var(--muted); font-weight:300; line-height:1.75; margin-bottom:2.5rem; }
        .demo-launch-btn { position:relative; display:inline-flex; align-items:center; gap:1rem; background:transparent; color:var(--cream); font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500; padding:0.9rem 1.75rem 0.9rem 1rem; border-radius:999px; border:none; cursor:pointer; transition:all 0.4s ease; letter-spacing:0.12em; text-transform:uppercase; outline:none; text-decoration:none; }
        .demo-launch-btn::before { content:''; position:absolute; inset:0; border-radius:999px; border:1px solid rgba(59,130,246,0.35); transition:all 0.4s ease; pointer-events:none; }
        .demo-launch-btn::after { content:''; position:absolute; inset:3px; border-radius:999px; border:1px solid rgba(59,130,246,0.15); transition:all 0.4s ease; pointer-events:none; }
        .demo-launch-btn:hover::before { border-color:rgba(59,130,246,0.7); box-shadow:0 0 20px rgba(59,130,246,0.2),inset 0 0 20px rgba(59,130,246,0.05); }
        .demo-launch-btn:hover { color:white; }
        .demo-btn-icon { position:relative; z-index:1; width:38px; height:38px; border-radius:50%; background:rgba(59,130,246,0.15); border:1px solid rgba(59,130,246,0.35); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.4s ease; box-shadow:0 0 12px rgba(59,130,246,0.2); }
        .demo-launch-btn:hover .demo-btn-icon { background:rgba(59,130,246,0.3); border-color:rgba(59,130,246,0.6); box-shadow:0 0 20px rgba(59,130,246,0.4); }

        .footer-links { display:flex; gap:1.5rem; }
        .footer-links a { color:var(--muted); text-decoration:none; transition:color 0.2s; }
        .footer-links a:hover { color:var(--cream); }

            <div class="lang-dropdown">
                <button class="lang-option active" data-lang="en">English</button>
                <button class="lang-option" data-lang="sv">Svenska</button>

                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();
    var navT = {
        en: { nav_concept:'Concept', nav_waitlist:'Waitlist' },
        sv: { nav_concept:'Concept', nav_waitlist:'Waitlist' },
        es: { nav_concept:'Concept', nav_waitlist:'Waitlist' },
        it: { nav_concept:'Concept', nav_waitlist:'Waitlist' }
    };
    function applyLang(lang) {
        if (!navT[lang]) return;
        localStorage.setItem('ove-lang', lang);
        var t = navT[lang];
        document.querySelectorAll('[data-i18n]').forEach(function(el) {
            var k = el.getAttribute('data-i18n');
            if (t[k] !== undefined) el.textContent = t[k];
        });
        document.querySelectorAll('.lang-option').forEach(function(o) {
            o.classList.toggle('active', o.dataset.lang === lang);
        });
        document.getElementById('lang-switcher').classList.remove('open');
    }
    document.getElementById('lang-btn').addEventListener('click', function(e) { e.stopPropagation(); document.getElementById('lang-switcher').classList.toggle('open'); });
    document.querySelectorAll('.lang-option').forEach(function(o) { o.addEventListener('click', function(e) { e.stopPropagation(); applyLang(o.dataset.lang); }); });
    document.addEventListener('click', function() { document.getElementById('lang-switcher').classList.remove('open'); });
    var saved = localStorage.getItem('ove-lang'); if (saved && navT[saved]) applyLang(saved);
</script>
