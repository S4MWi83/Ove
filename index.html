<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ové — Coming Soon</title>
    <link rel="icon" type="image/svg+xml" href="ove-favicon-e.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #060f1e;
            color: #f0ece4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .orb {
            position: fixed;
            width: 60vw; height: 60vw;
            top: -20vw; left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(59,130,246,0.13), transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }
        .wrap {
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        .logo {
            font-family: 'Instrument Serif', serif;
            font-size: 2.2rem;
            color: #f0ece4;
            position: relative;
            display: inline-block;
            margin-bottom: 2.5rem;
        }
        .logo span {
            display: inline-block;
            width: 6px; height: 6px;
            background: #3b82f6;
            border-radius: 50%;
            position: absolute;
            top: 6px; right: -10px;
        }
        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            line-height: 1.15;
            margin-bottom: 1rem;
            letter-spacing: -0.01em;
        }
        p {
            font-size: 1rem;
            color: #9db5cc;
            font-weight: 300;
            max-width: 360px;
            margin: 0 auto;
            line-height: 1.7;
        }
        a {
            color: #3b82f6;
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="orb"></div>
    <div class="wrap">
        <div class="logo">Ové<span></span></div>
        <h1>Back soon.</h1>
        <p>We're making some updates. Follow <a href="https://x.com/BeginOve" target="_blank">@BeginOve</a> for news.</p>
    </div>
</body>
</html>
